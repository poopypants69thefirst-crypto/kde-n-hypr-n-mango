# Monitors - Uncomment this and set your monitor if on vm
# monitorrule=Virtial-1,0.55,1,tile,0,1,0,0,1920,1080,60
# Heavily Inspired by Argos Nothing's DWM Re-write + Fun stuff.
# Check his out here: https://github.com/argosnothing/mango-dwm-config/
#exec-once = sleep 3 && qs -c noctalia-shell &
exec-once = sleep 1 && gentoo-pipewire-launcher restart &
exec-once = sleep 2 && /home/chi/.config/mango/portal-start.sh
exec-once = sleep 3 && qs -c noctalia-shell
#exec-once = swaybg -i /home/chi/Pictures/Wallpapers/wallhaven-85v7rk.png -m fill
bind=SUPER,Return,spawn,foot
bind=SUPER,s,spawn,/home/chi/.config/mango/snip.sh
bind =SUPER, D, spawn, fuzzel
# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# Opacity for windows in the background (0.0 to 1.0)
unfocused_opacity = 0.9

# window border
border_size = 2
active_border_color = 0xff5e81ac 
inactive_border_color = 0xff4c566a

# Toggle touchpad using the dedicated laptop key
bind=SUPER,space,toggle_trackpad_enable

# mouse
mouse_natural_scrolling=0

bind=SUPER,1,comboview,1
bind=SUPER,2,comboview,2
bind=SUPER,3,comboview,3
bind=SUPER,4,comboview,4
bind=SUPER,5,comboview,5
bind=SUPER,6,comboview,6
bind=SUPER,7,comboview,7
bind=SUPER,8,comboview,8
bind=SUPER,9,comboview,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8

bind=SUPER,i,incnmaster,+1
bind=SUPER,p,incnmaster,-1
bind=SUPER,q,killclient
bind=SUPER+SHIFT,r,reload_config

# Layouts
bind=SUPER+SHIFT,t,setlayout,tile
bind=SUPER+SHIFT,v,setlayout,vertical_grid
bind=SUPER+SHIFT,c,setlayout,spiral
bind=SUPER+SHIFT,x,setlayout,scroller
bind=SUPER,n,switch_layout
bind=SUPER,a,togglegaps

# Audio with NONE modifier
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+ --limit 1.0
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle

# Brightness with NONE modifier
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

#noctalia
bind = SUPER, D, spawn, qs  -c  noctalia-shell ipc call launcher toggle
#bind = SUPER, S, spawn, qs -c noctalia-shell ipc call controlCenter toggle
bind = SUPER, comma, spawn, qs -c noctalia-shell ipc call settings toggle
bind = SUPER, V, spawn, qs -c noctalia-shell ipc call launcher clipboard
bind = SUPER, L, spawn, qs -c noctalia-shell ipc call lockScreen lock
bind = SUPER, J, spawn, qs -c noctalia-shell ipc call bar toggle
bind = CTRL+SUPER, T, spawn, qs -c noctalia-shell ipc call wallpaper toggle

# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile


animations=1
gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=2
no_border_when_single=0
focuscolor=ffffffff

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# options
repeat_rate=35
repeat_delay=150
xkb_rules_layout=us,ara
xkb_rules_options=grp:alt_shift_toggle
# Effect
blur=0
blur_layer=1
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 1
shadow_only_floating=1
shadows_size = 12
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER,f,togglefullscreen,
bind=SUPER,t,togglefloating,

# smartmovewin
bind=CTRL+SHIFT,k,smartmovewin,up
bind=CTRL+SHIFT,j,smartmovewin,down
bind=CTRL+SHIFT,h,smartmovewin,left
bind=CTRL+SHIFT,l,smartmovewin,right

# switch window focus
bind=SUPER,Down,focusstack,next
bind=SUPER,Up,focusstack,prev
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
# Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
bind=SUPER,0,toggleoverview
