################
### MONITORS ###
################

monitor=eDP-1,1920x1080@144,auto,1.0
monitor=HDMI-A-5,1920x1080@144,auto,1.0
monitor = , preferred, auto, 1

# Set programs that you use
$terminal = foot
$fileManager = yazi
$menu = fuzzel

# Environment variables
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_DESKTOP_PORTAL_HYPRLAND_FORCE_SHM,1

#################
### AUTOSTART ###
#################

exec-once = sleep 1 && gentoo-pipewire-launcher restart
exec-once = exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = /home/chi/.config/hypr/xdg-portal-hyprland
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/libexec/hyprpolkitagent
exec-once = brightnessctl set 50%


#############
### INPUT ###
#############
input {
    repeat_delay = 250
    repeat_rate = 50
    kb_layout = us,ara
    kb_variant =
    kb_model =
    # Use a comma to separate different keyboard options
    kb_options = grp:alt_shift_toggle
    kb_rules =
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.2
    }

    sensitivity = 0.15 
}

general {
    gaps_in = 3
    gaps_out = 8

    border_size = 3

    resize_on_border = true

    layout = dwindle
}

decoration {
    active_opacity = 1.0
    inactive_opacity = 1.0
    rounding = 0
    rounding_power = 2.0
    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}


# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

general {
    # Inner and Outer gaps between windows.
    gaps_in = 5
    gaps_out = 10

    # I prefer a thin border
    border_size = 1

    # Border colors.
    col.active_border = rgb(d8cab8)
    col.inactive_border = rgb(AC82E9)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    layout = dwindle

    # READ https://wiki.hyprland.org/Configuring/Tearing/ BEFORE TURNING ON!
    allow_tearing = false
}

# Window Decorations! Shadow, Blur, etc.
decoration {
    # 8px same as taskbar, change if wanted.
    rounding = 0

    # I want transparancy to not change, since we have the colored border.
    active_opacity = 1.0
    inactive_opacity = 1

    # Window Shadow
    shadow:enabled = true
    shadow:range = 16
    shadow:render_power = 5
    shadow:color = rgba(0,0,0,0.2)

    # Transparent Window Blur
    blur:enabled = false
}

# Read https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more info on dwindle layout.
dwindle {
    pseudotile = true
    preserve_split = true
}

# Read https://wiki.hyprland.org/Configuring/Master-Layout/ for more info on master layout.
master {
    new_status = master
}

# We have our own wallpapers :) So I'll disable default things.
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


###################
### KEYBINDINGS ###
###################
$mainMod = SUPER # Sets "Windows" key as main modifier


bind = $mainMod, Return, exec, $terminal
# bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, T, togglefloating
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, P, exec, $powerMenu
bind = $mainMod SHIFT, X, exec, $settingsMenu
bind = $mainMod SHIFT, C, exec, $configMenu
bind = $mainMod SHIFT, H, exec, $helpMenu
bind = $mainMod, Space, exec, hyprctl keyword "device[ftcs0038:00-2808:0106-touchpad]:enabled" true
bind = $mainModm SHIFT, Space, exec, hyprctl keyword "device[ftcs0038:00-2808:0106-touchpad]:enabled" false
bind = $mainMod, L, exec, hyprlock

# Cycle through existing windows
bind = ALT, Tab, cyclenext,          # change focus to another window
bind = ALT, Tab, bringactivetotop,   # bring it to the front

# overlay workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, u
bind = $mainMod, k, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod ALT, p, pin, active

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # left click
bindm = $mainMod, mouse:273, resizewindow # right click

# Kill focused window
bind = $mainMod, Q, killactive

# Volume
bind = $mainMod, F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Brightness
bind = $mainMod, F5, exec, brightnessctl s 5%-
bind = $mainMod, F6, exec, brightnessctl s 5%+

bind = , Print, exec, hyprshot -m region -o /home/chi/Pictures/Screenshots

# resize
binde = SUPER ALT, right, resizeactive, 10 0
binde = SUPER ALT, left, resizeactive, -10 0
binde = SUPER ALT, up, resizeactive, 0 -10
binde = SUPER ALT, down, resizeactive, 0 10
bind = $mainMod, F, fullscreen

# reorder
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

